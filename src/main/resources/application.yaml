spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: affismart-mall-be
  profiles:
    default: dev
  mvc:
    problemdetails:
      enabled: false
  jackson:
    time-zone: Asia/Bangkok

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  timezone: Asia/Bangkok
  cors:
    allow-credentials: true
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
  auth:
    jwt:
      issuer: affismart-mall-be
      access-token-ttl: 30m
      secret: ${JWT_SECRET}
    refresh-token:
      ttl: 7d
      used-token-ttl: 7d
      rotate-lock-ttl: 5s
      cookie-name: refresh_token
      cookie-path: /api/v1/auth
      http-only: true
      max-sessions: 5
      token-entropy-bytes: 32
  bootstrap:
    admin:
      enabled: ${ADMIN_BOOTSTRAP_ENABLED:false}
      email: ${ADMIN_EMAIL:}
      password: ${ADMIN_PASSWORD:}
      full-name: ${ADMIN_FULL_NAME:AffiSmart Administrator}
  storage:
    cloudinary:
      enabled: ${CLOUDINARY_ENABLED:false}
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_FOLDER:affismart/products}
  inventory:
    low-stock-threshold: 10
    low-stock-cron: "0 0 0 * * ?"
